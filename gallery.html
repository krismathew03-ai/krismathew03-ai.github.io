<!-- Lightbox -->
<div class="lightbox" id="lightbox" role="dialog" aria-label="Photo viewer">

<!-- Lightbox -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <button class="lightbox-close" id="lbClose" aria-label="Close">×</button>
  <button class="lightbox-nav lightbox-prev" id="lbPrev" aria-label="Previous">‹</button>
  <img id="lbImg" src="" alt="" />
  <button class="lightbox-nav lightbox-next" id="lbNext" aria-label="Next">›</button>
  <div class="lightbox-counter" id="lbCounter">1 / 1</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const toggle = document.getElementById('mobileNavToggle');
  const sidebar = document.getElementById('sidebar');
  toggle.addEventListener('click', () => {
    sidebar.classList.toggle('open');
    toggle.classList.toggle('active');
  });
  sidebar.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => {
      sidebar.classList.remove('open');
      toggle.classList.remove('active');
    });
  });

  // Scroll progress bar
  const bar = document.getElementById('scrollBar');
  if (bar) {
    const updateBar = () => {
      const h = document.documentElement;
      const scrolled = (h.scrollTop) / (h.scrollHeight - h.clientHeight) * 100;
      bar.style.width = Math.min(100, Math.max(0, scrolled)) + '%';
    };
    window.addEventListener('scroll', updateBar, { passive: true });
    updateBar();
  }

  // Fade photos in as they enter the viewport
  // (mark them as js-fade so CSS knows to hide them; if JS fails, they stay visible)
  const allPhotos = document.querySelectorAll('.photo');
  if ('IntersectionObserver' in window) {
    allPhotos.forEach(el => el.classList.add('js-fade'));
    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -5% 0px' });
    allPhotos.forEach(el => io.observe(el));
  }

  // Hash jump on load
  if (window.location.hash) {
    setTimeout(() => {
      const target = document.querySelector(window.location.hash);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }

  // ===== Lightbox =====
  const photos = Array.from(document.querySelectorAll('.photo img'));
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  const lbCounter = document.getElementById('lbCounter');
  let lbIndex = 0;

  function openLightbox(i) {
    lbIndex = i;
    const src = photos[i].src;
    const alt = photos[i].alt || '';
    lbImg.src = src;
    lbImg.alt = alt;
    lbCounter.textContent = String(i + 1).padStart(2, '0') + ' / ' + String(photos.length).padStart(2, '0');
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }
  function showPrev() {
    openLightbox((lbIndex - 1 + photos.length) % photos.length);
  }
  function showNext() {
    openLightbox((lbIndex + 1) % photos.length);
  }

  // Click each photo anchor to open
  document.querySelectorAll('.photo').forEach((el, i) => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      openLightbox(i);
    });
  });

  // Controls
  document.getElementById('lbClose').addEventListener('click', closeLightbox);
  document.getElementById('lbPrev').addEventListener('click', (e) => { e.stopPropagation(); showPrev(); });
  document.getElementById('lbNext').addEventListener('click', (e) => { e.stopPropagation(); showNext(); });

  // Click the backdrop (but not the image or buttons) to close
  lb.addEventListener('click', (e) => {
    if (e.target === lb) closeLightbox();
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    else if (e.key === 'ArrowLeft') showPrev();
    else if (e.key === 'ArrowRight') showNext();
  });

  // ---------- Lightbox ----------
  const photos = Array.from(document.querySelectorAll('.photo'));
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  const lbCounter = document.getElementById('lbCounter');
  const lbClose = document.getElementById('lbClose');
  const lbPrev = document.getElementById('lbPrev');
  const lbNext = document.getElementById('lbNext');
  let currentIdx = 0;

  function openLightbox(idx) {
    currentIdx = idx;
    const src = photos[idx].querySelector('img').src;
    const alt = photos[idx].querySelector('img').alt;
    lbImg.src = src;
    lbImg.alt = alt;
    lbCounter.textContent = `${idx + 1} / ${photos.length}`;
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  function nextPhoto() {
    openLightbox((currentIdx + 1) % photos.length);
  }
  function prevPhoto() {
    openLightbox((currentIdx - 1 + photos.length) % photos.length);
  }

  photos.forEach((p, i) => {
    p.addEventListener('click', (e) => {
      e.preventDefault();
      openLightbox(i);
    });
  });

  lbClose.addEventListener('click', closeLightbox);
  lbPrev.addEventListener('click', (e) => { e.stopPropagation(); prevPhoto(); });
  lbNext.addEventListener('click', (e) => { e.stopPropagation(); nextPhoto(); });
  lightbox.addEventListener('click', (e) => {
    // Click outside the image closes
    if (e.target === lightbox || e.target === lbImg) {
      // only close when clicking background, not the image itself
      if (e.target !== lbImg) closeLightbox();
    }
  });
  lbImg.addEventListener('click', (e) => {
    e.stopPropagation();
    closeLightbox();
  });

  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    else if (e.key === 'ArrowRight') nextPhoto();
    else if (e.key === 'ArrowLeft') prevPhoto();
  });
</script>
